name: Release desktop app

# Builds the double-clickable CUFLynx executable for each OS and attaches it to a
# GitHub Release. PyInstaller cannot cross-compile, so each artifact is built on
# its own runner.
#
# Push a tag to publish:  git tag v0.1.0 && git push origin v0.1.0
# Or run manually (workflow_dispatch) to get artifacts without cutting a release.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Pinned, NOT ubuntu-latest. glibc is backward- but not forward-
          # compatible: a binary built against ubuntu-latest (24.04, glibc 2.39)
          # dies on anything older with
          #   "libm.so.6: version `GLIBC_2.38' not found"
          # — including Ubuntu 22.04, which is still widely used. Build against the
          # OLDEST glibc we want to support; the result runs on that and newer.
          # Bumping this raises the minimum distro users can run the app on.
          - os: ubuntu-22.04
            asset: CUFLynx-linux-x86_64
            binary: dist/CUFLynx
          # PyInstaller can't cross-compile, and a macOS arm64 binary won't run on
          # an Intel Mac — so each architecture needs its own runner. macos-latest
          # is Apple silicon. For Intel use macos-15-intel: macos-13 was RETIRED in
          # Dec 2025 and jobs targeting it queue forever rather than failing, and
          # macos-15-intel is the last Intel image (GitHub drops x86-64 macOS in
          # Fall 2027, after which Intel Macs must build from source).
          - os: macos-latest
            asset: CUFLynx-macos-arm64
            binary: dist/CUFLynx
          - os: macos-15-intel
            asset: CUFLynx-macos-x86_64
            binary: dist/CUFLynx
          - os: windows-latest
            asset: CUFLynx-windows-x86_64.exe
            binary: dist/CUFLynx.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Myokit compiles models at run time against Sundials, and the spec bundles
      # Sundials' headers/libs into the executable — so they must be present here,
      # at *build* time. Linux/macOS need an explicit install; the Windows myokit
      # wheel ships them.
      - name: Install Sundials (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsundials-dev python3-dev

      # NB: no system OpenMPI on Linux/macOS — the [analysis] extra pip-installs a
      # self-contained MPICH (bundled by the spec), so the app needs no system MPI.
      # Windows has no MPICH wheel, so it uses Microsoft MPI (msmpi.dll).
      - name: Install MPI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Microsoft MPI runtime (provides msmpi.dll) from the official GitHub
          # release. mpi4py's Windows wheel loads msmpi.dll at run time; the spec
          # bundles that DLL so it works on a machine with no MS-MPI installed.
          $ErrorActionPreference = "Stop"
          $url = "https://github.com/microsoft/Microsoft-MPI/releases/download/v10.1.1/msmpisetup.exe"
          Invoke-WebRequest -Uri $url -OutFile msmpisetup.exe
          Start-Process -Wait -FilePath .\msmpisetup.exe -ArgumentList "-unattend"
          # Surface the runtime dir for later steps / the spec.
          "MSMPI_BIN=$env:SystemRoot\System32" | Out-File -FilePath $env:GITHUB_ENV -Append

      # NOT `brew install sundials`: Homebrew's build is MPI-enabled, and its
      # libraries abort at run time with "MPI_Comm_dup() called before MPI_INIT"
      # even for a serial model — so it cannot be shipped. Build a serial (non-MPI)
      # Sundials from source with @rpath install names (so the bundled copies
      # resolve via the rpath Myokit sets on the compiled model), and point the
      # spec at it via CUFLYNX_SUNDIALS_ROOT.
      - name: Build serial Sundials (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          VER=6.5.1
          curl -fsSL "https://github.com/LLNL/sundials/releases/download/v${VER}/sundials-${VER}.tar.gz" -o sundials.tar.gz
          tar xzf sundials.tar.gz
          cmake -S "sundials-${VER}" -B sundials-build \
            -DCMAKE_INSTALL_PREFIX="$HOME/sundials-serial" \
            -DBUILD_SHARED_LIBS=ON -DBUILD_STATIC_LIBS=OFF \
            -DENABLE_MPI=OFF -DEXAMPLES_ENABLE_C=OFF -DEXAMPLES_INSTALL=OFF \
            -DBUILD_TESTING=OFF \
            -DCMAKE_INSTALL_NAME_DIR=@rpath
          cmake --build sundials-build --target install -j3
          echo "CUFLYNX_SUNDIALS_ROOT=$HOME/sundials-serial" >> "$GITHUB_ENV"
          # Sanity: the built config must have MPI off.
          grep -q "SUNDIALS_MPI_ENABLED 0" "$HOME/sundials-serial/include/sundials/sundials_config.h"

      # [analysis] bundles CA's analysis stack (emcee/SALib/nevergrad/matplotlib/
      # mpi4py/...) so the packaged app runs SA/calibration/UQ itself.
      - name: Install Python deps
        working-directory: apps/api
        run: pip install -e ".[desktop,analysis]"

      # NB: rebuilding the PyInstaller bootloader from source (to dodge the Windows
      # AV false-positive) was attempted here and REMOVED -- it did not fire on the
      # Windows runner. PyInstaller's sdist ships a prebuilt Windows bootloader and
      # the build reused it; even PYINSTALLER_COMPILE_BOOTLOADER=1 did not force a
      # recompile in CI (verified: 0.07s wheel build, zero compiler output). See
      # issue and packaging/README.md. The version resource below is the mitigation
      # that IS applied; code signing is the durable fix.

      # yarn, not npm: the repo has yarn.lock and no package-lock.json, so
      # `npm ci` errors out. Matches ci.yml.
      - name: Install frontend deps
        working-directory: apps/web
        run: yarn install --frozen-lockfile

      - name: Build executable
        run: python scripts/package.py
        env:
          # Pin the macOS floor for the same reason ubuntu-22.04 is pinned above.
          # Without this the deployment target defaults to the build SDK, so as
          # the floating macos-latest image advances the binary's LC_BUILD_VERSION
          # minos silently rises and OLDER Macs stop launching it — the macOS
          # analogue of "GLIBC_2.38 not found", and just as invisible at build
          # time. 11.0 is the first macOS with Apple silicon support, so it costs
          # nothing on arm64 and keeps Intel users on Big Sur working.
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          # Stop mpi4py from calling MPI_Init while PyInstaller *analyses* it.
          # collect_all('mpi4py.futures') enumerates submodules in an isolated
          # child process, which imports mpi4py — and mpi4py initialises MPI at
          # import. On the Linux runners MPICH's UCX transport intermittently
          # fails to come up:
          #     UCX  ERROR failed to unpack address, invalid bandwidth 0.00
          #     Abort: Fatal error in internal_Init_thread ... MPIDI_UCX_init_local
          # killing the child (exit 143) and failing the build with
          # SubprocessDiedError. It took out 2 of 3 release builds.
          #
          # The build only needs to *enumerate* mpi4py, never to run MPI, so skip
          # the init entirely. This is a build-time env var: it is not baked into
          # the executable, so MPI still initialises normally at run time.
          MPI4PY_RC_INITIALIZE: "0"
          # Belt and braces: if mpi4py is too old to honour the rc env var
          # (added in 3.1; the extra pins only >=3.0), keep UCX off the device
          # probe that fails. Harmless where UCX isn't present.
          UCX_TLS: "tcp,self"

      # circulatory_autogen isn't bundled (it's picked at runtime), but the smoke
      # test needs it to run a real simulation — see below.
      - name: Check out circulatory_autogen
        uses: actions/checkout@v4
        with:
          repository: physiomelinks/circulatory_autogen
          path: circulatory_autogen

      # Smoke-test the frozen app on a machine that never ran it from source.
      #
      # This deliberately runs a REAL SIMULATION, not just /api/health. v0.1.0
      # shipped with the python/casadi_python backends completely broken
      # (KeyError: 'VARIABLE_COUNT' — the build resolved libcellml 0.7, which CA
      # doesn't support) and a health-only check waved it straight through. The
      # bug lived in the *bundled dependency set*, so only exercising the real
      # code path in the frozen binary can catch it.
      #
      # Uses the `python` backend (scipy solve_ivp): it exercises CellML -> Python
      # code generation, which is where the breakage was, and needs no C compiler,
      # so it runs identically on all four runners.
      #
      # Model is Lotka-Volterra, not 3compartment: solve_ivp's default RK45 is an
      # *explicit* method and 3compartment is stiff, so it would run essentially
      # forever (and hang the job). LV exercises the same codegen path in <1s.
      - name: Smoke-test the executable (real simulation)
        shell: bash
        run: |
          set -euo pipefail
          "${{ matrix.binary }}" --port 8123 --browser &
          APP=$!
          for _ in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8123/api/health > /dev/null; then break; fi
            sleep 2
          done

          curl -sf http://127.0.0.1:8123/api/health
          curl -sf http://127.0.0.1:8123/api/config | grep -q '"packaged":true'

          # Point it at circulatory_autogen, exactly as a user does in Settings.
          # Build the payload with python: on Windows the shell is Git-bash, where
          # $PWD is a POSIX path (/d/a/...) that the app's os.path.isdir can't
          # resolve — and the native path (D:\a\...) needs its backslashes escaped
          # for JSON. json.dumps handles both.
          python - <<'PY' > ca_dir.json
          import json, os
          print(json.dumps({"ca_dir": os.path.abspath("circulatory_autogen")}))
          PY
          curl -sf -X POST http://127.0.0.1:8123/api/config \
            -H 'Content-Type: application/json' -d @ca_dir.json -o config.json
          python - <<'PY'
          import json, sys
          d = json.load(open("config.json"))
          if not d.get("ca_exists"):
              sys.exit(f"CA dir not accepted: ca_dir={d.get('ca_dir')!r}")
          print("CA dir OK:", d["ca_dir"])
          PY

          MODEL_ID=$(curl -sf -F "file=@resources/Lotka_Volterra_forced.cellml" \
            http://127.0.0.1:8123/api/models/upload \
            | python -c "import json,sys; print(json.load(sys.stdin)['model_id'])")

          # Exercise ALL THREE backends. Each has broken in the packaged app for a
          # different reason that only a real simulation in the frozen binary caught:
          #   python        - libcellml 0.7 (KeyError: VARIABLE_COUNT)
          #   casadi_python - casadi missing from the bundle
          #   cellml_only   - CVODE_myokit JIT-compiles a C extension; on Windows it
          #                   couldn't find Python.h (headers shipped to the posix
          #                   dir, not <bundle>/Include) nor pythonXX.lib to link.
          # cellml_only needs a C compiler, but all four runners have one (gcc /
          # clang / MSVC), so testing it here validates the Python-header + Sundials
          # bundling on every platform.
          for BACKEND in python casadi_python cellml_only; do
            case "$BACKEND" in
              python)        SOLVER='{"generated_model_format":"python","solver":"solve_ivp","solver_info":{"method":"RK45","dt":0.01}}' ;;
              casadi_python) SOLVER='{"generated_model_format":"casadi_python","solver":"casadi_integrator","solver_info":{"method":"cvodes","dt":0.01}}' ;;
              cellml_only)   SOLVER='{"generated_model_format":"cellml_only","solver":"CVODE_myokit","solver_info":{"method":"CVODE","dt":0.01}}' ;;
            esac
            curl -sf -X POST http://127.0.0.1:8123/api/config \
              -H 'Content-Type: application/json' -d "$SOLVER" > /dev/null

            curl -s --max-time 300 -X POST http://127.0.0.1:8123/api/simulate \
              -H 'Content-Type: application/json' \
              -d "{\"model_id\":\"$MODEL_ID\",\"params\":{},\"sim_time\":2.0}" \
              -o "sim_$BACKEND.json" || true

            BACKEND="$BACKEND" python - <<'PY'
          import json, os, sys
          backend = os.environ["BACKEND"]
          path = f"sim_{backend}.json"
          if not os.path.exists(path) or os.path.getsize(path) == 0:
              sys.exit(f"[{backend}] no response — the app hung or died")
          d = json.load(open(path))
          if "detail" in d:
              sys.exit(f"[{backend}] SIMULATION FAILED in the packaged app: {d['detail']}")
          n = len(d["time"])
          if n < 2 or not d["outputs"]:
              sys.exit(f"[{backend}] no usable data: {n} points, outputs={list(d['outputs'])}")
          print(f"simulation OK [{backend}]: {n} points, outputs: {', '.join(list(d['outputs'])[:3])}")
          PY
          done

          kill $APP || true

      - name: Rename artifact
        shell: bash
        run: cp "${{ matrix.binary }}" "${{ matrix.asset }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  # End-to-end test of the ANALYSIS tier (sensitivity + calibration) in the built
  # binary. The build-job smoke test covers live simulation; analysis is different
  # — the app runs the runners in its OWN bundled interpreter (runner mode), which
  # is the ONLY path that loads the bundled MPI runtime (CA imports mpi4py). So
  # this runs on EVERY platform: the MPI bundling differs per-OS (MPICH on
  # Linux/macOS, MS-MPI on Windows) and is otherwise untested — a broken macOS or
  # Windows analysis bundle would ship green without this.
  #
  # Reuses each platform's artifact (no rebuild). Only circulatory_autogen's
  # *source* is needed (for the CA dir); its deps are already in the bundle. No
  # `--runner-python`, and deliberately NO CA deps installed into this job's
  # Python, so a pass proves the bundle is self-sufficient.
  analysis-e2e:
    name: Analysis e2e (${{ matrix.os }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            asset: CUFLynx-linux-x86_64
          - os: macos-latest
            asset: CUFLynx-macos-arm64
          - os: macos-15-intel
            asset: CUFLynx-macos-x86_64
          - os: windows-latest
            asset: CUFLynx-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Download the executable
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.asset }}

      - name: Check out circulatory_autogen
        uses: actions/checkout@v4
        with:
          repository: physiomelinks/circulatory_autogen
          path: circulatory_autogen

      - name: Run sensitivity + calibration in the built app (bundled interpreter)
        shell: bash
        run: |
          chmod +x "${{ matrix.asset }}" 2>/dev/null || true
          python scripts/analysis_smoke.py \
            --binary "$PWD/${{ matrix.asset }}" \
            --ca-dir "$PWD/circulatory_autogen" \
            --sensitivity-timeout 900 --calibration-timeout 900

  release:
    name: Publish release
    # Gate on the analysis e2e too: don't publish a build that can't run SA/calibration.
    needs: [build, analysis-e2e]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: CUFLynx-*
          body: |
            Download the file for your OS and double-click it.

            **Optional:** a C compiler — only the `CVODE_myokit` backend needs one
            (Myokit compiles each model to a native extension at run time, which
            can't be bundled away). Without it the app shows a warning and you use
            the `python` (scipy `solve_ivp`) or `casadi_python` backends, which
            need no compiler. Sundials/CVODE and the Python headers *are* bundled.

            Point the app at your `circulatory_autogen` checkout via
            **Settings -> CA dir** on first run; it is remembered afterwards.
